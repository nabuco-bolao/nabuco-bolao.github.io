<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bolão Nabuco · Ranking ao vivo</title>
  <meta name="description" content="Ranking ao vivo do Bolão Nabuco — Copa do Mundo 2026, a partir das 16-avos. Palpites e resultados em tempo real." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟢</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-logo">🟢</span>
      <div>
        <h1>Bolão <strong>Nabuco</strong></h1>
        <span class="brand-sub">Copa 2026 · ao vivo</span>
      </div>
    </div>
    <div id="atualizado" class="live-chip">carregando…</div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-aba="hoje" class="ativo">🔥 Hoje</button>
    <button data-aba="ranking">🏅 Ranking</button>
    <button data-aba="jogos">⚽ Jogos</button>
    <button data-aba="chave">🗺️ Chaveamento</button>
    <button data-aba="participante">👤 Palpites</button>
    <button data-aba="comparar">🆚 Comparar</button>
    <button data-aba="master">⭐ Master</button>
    <button data-aba="regras">📜 Regras</button>
  </nav>

  <main id="app">
    <div class="loading">Carregando dados do bolão…</div>
  </main>

  <footer class="rodape">
    <span><strong>Pontuação</strong> — 5 (placar exato) · 2 (acertou o vencedor/empate). Campeão: 7 · Artilheiro: 5.</span>
    <span>Vale o placar dos 90 minutos + acréscimos (prorrogação e pênaltis não contam).</span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
